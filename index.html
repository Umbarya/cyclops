<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eye Follower - Fast Random</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            background-color: transparent;
            overflow: hidden;
            height: 100vh;
            width: 100vw;
        }

        .eye-container {
            position: absolute;
            top: 50%;
            right: 10px;
            transform: translateY(-50%);
            width: 150px;
            height: 150px;
            pointer-events: none;
        }

        .pupil-layer {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 100px;
            height: 100px;
            margin-top: -50px; 
            margin-left: -50px;
            
            background-image: url('trong-mat.png');
            background-size: cover;
            background-position: center;
            z-index: 1;
            
            transition: transform 0.2s ease-out; 
            will-change: transform;
        }

        .shell-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('ve-ngoai.png');
            background-size: cover;
            background-position: center;
            z-index: 2;
        }
    </style>
</head>
<body>

    <div class="eye-container">
        <div class="pupil-layer" id="pupil"></div>
        <div class="shell-layer"></div>
    </div>

    <script>
        const pupil = document.getElementById('pupil');

        function moveEyeFast() {
            const angle = Math.random() * Math.PI * 2;

            const distance = Math.random() * 15; 

            const moveX = Math.cos(angle) * distance;
            const moveY = Math.sin(angle) * distance;

            pupil.style.transform = `translate(${moveX}px, ${moveY}px)`;
        }

        setInterval(moveEyeFast, 500);
    </script>
</body>
</html>
